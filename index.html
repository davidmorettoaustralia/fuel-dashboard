<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGL — Fuel Rationing Early Warning</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0d0f12;
    --bg2:      #141720;
    --bg3:      #1c2030;
    --border:   rgba(255,255,255,0.07);
    --border2:  rgba(255,255,255,0.13);
    --text:     #e2e4ea;
    --muted:    #7c8099;
    --dim:      #454860;
    --green:    #3ecf8e;
    --green-bg: rgba(62,207,142,0.10);
    --amber:    #f5a623;
    --amber-bg: rgba(245,166,35,0.10);
    --red:      #ff5c5c;
    --red-bg:   rgba(255,92,92,0.10);
    --blue:     #4f8ef7;
    --mono:     'IBM Plex Mono', monospace;
    --sans:     'IBM Plex Sans', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 14px; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-weight: 300;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }
  .logo {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: .08em;
    color: var(--text);
  }
  .logo span { color: var(--red); }
  .header-right {
    display: flex;
    align-items: center;
    gap: 20px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }
  .pulse {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    display: inline-block;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50%      { opacity: .4; transform: scale(.75); }
  }

  /* ── Layout ── */
  main { max-width: 1200px; margin: 0 auto; padding: 2rem; }

  /* ── Risk banner ── */
  .risk-banner {
    border: 1px solid;
    border-radius: 6px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }
  .risk-banner.CRITICAL { border-color: var(--red);   background: var(--red-bg);   }
  .risk-banner.HIGH     { border-color: var(--red);   background: var(--red-bg);   }
  .risk-banner.ELEVATED { border-color: var(--amber); background: var(--amber-bg); }
  .risk-banner.NORMAL   { border-color: var(--green); background: var(--green-bg); }
  .risk-banner.unknown  { border-color: var(--dim);   background: var(--bg2);      }
  .risk-label {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: .12em;
    color: var(--muted);
    margin-bottom: 3px;
  }
  .risk-level {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 500;
    letter-spacing: .04em;
  }
  .risk-banner.CRITICAL .risk-level,
  .risk-banner.HIGH     .risk-level { color: var(--red); }
  .risk-banner.ELEVATED .risk-level { color: var(--amber); }
  .risk-banner.NORMAL   .risk-level { color: var(--green); }
  .risk-desc { font-size: 13px; color: var(--muted); max-width: 60%; line-height: 1.5; }
  .risk-counts { display: flex; gap: 16px; flex-shrink: 0; }
  .count-chip {
    text-align: center;
    font-family: var(--mono);
  }
  .count-chip .n {
    font-size: 28px;
    font-weight: 500;
    display: block;
    line-height: 1;
  }
  .count-chip .lbl { font-size: 10px; color: var(--muted); letter-spacing: .08em; }
  .count-chip.red .n   { color: var(--red); }
  .count-chip.amber .n { color: var(--amber); }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 1.5rem;
    overflow-x: auto;
  }
  .tab {
    padding: 10px 18px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: .08em;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    background: none;
    border-top: none; border-left: none; border-right: none;
    transition: color .15s, border-color .15s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); border-bottom-color: var(--blue); }
  .panel { display: none; }
  .panel.active { display: block; }

  /* ── Indicator grid ── */
  .ind-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 1rem;
  }
  .ind-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.25rem;
    transition: border-color .15s;
  }
  .ind-card:hover { border-color: var(--border2); }
  .ind-card.status-red    { border-left: 3px solid var(--red);   }
  .ind-card.status-amber  { border-left: 3px solid var(--amber); }
  .ind-card.status-green  { border-left: 3px solid var(--green); }
  .ind-card.status-unknown { border-left: 3px solid var(--dim);  }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: .75rem;
  }
  .card-label {
    font-size: 11px;
    font-family: var(--mono);
    letter-spacing: .08em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .status-badge {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: .1em;
    padding: 2px 8px;
    border-radius: 3px;
    font-weight: 500;
    flex-shrink: 0;
  }
  .status-badge.green   { background: var(--green-bg); color: var(--green); }
  .status-badge.amber   { background: var(--amber-bg); color: var(--amber); }
  .status-badge.red     { background: var(--red-bg);   color: var(--red);   }
  .status-badge.unknown { background: var(--bg3);      color: var(--dim);   }

  .card-value {
    font-family: var(--mono);
    font-size: 32px;
    font-weight: 500;
    line-height: 1;
    margin: .5rem 0 .25rem;
  }
  .card-value.green  { color: var(--green); }
  .card-value.amber  { color: var(--amber); }
  .card-value.red    { color: var(--red);   }
  .card-value.unknown{ color: var(--dim);   }
  .card-unit { font-size: 12px; color: var(--muted); margin-bottom: .75rem; }

  /* bar */
  .bar-wrap { margin: .75rem 0 .5rem; }
  .bar-track {
    height: 4px;
    background: var(--bg3);
    border-radius: 2px;
    position: relative;
    overflow: visible;
  }
  .bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width .4s ease;
  }
  .bar-pointer {
    position: absolute;
    top: -4px;
    width: 2px;
    height: 12px;
    background: var(--text);
    border-radius: 1px;
    transition: left .4s ease;
  }
  .bar-labels {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    font-family: var(--mono);
    color: var(--dim);
    margin-top: 4px;
  }

  .card-desc { font-size: 11px; color: var(--dim); line-height: 1.5; }
  .card-source {
    font-size: 10px;
    font-family: var(--mono);
    color: var(--dim);
    margin-top: .5rem;
    opacity: .7;
  }
  .card-note {
    font-size: 11px;
    color: var(--amber);
    margin-top: .5rem;
    padding: .4rem .6rem;
    background: var(--amber-bg);
    border-radius: 4px;
  }

  /* ── Data gaps panel ── */
  .gaps-list { list-style: none; }
  .gaps-list li {
    padding: .6rem .75rem;
    border: 1px solid var(--border);
    border-radius: 5px;
    margin-bottom: .5rem;
    font-size: 12px;
    color: var(--muted);
    font-family: var(--mono);
    display: flex;
    gap: .75rem;
    align-items: flex-start;
  }
  .gaps-list li::before {
    content: "⚠";
    color: var(--amber);
    flex-shrink: 0;
  }

  /* ── Composite summary ── */
  .composite-grid {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 1rem;
    margin-bottom: 1.5rem;
  }
  .comp-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem 1.25rem;
    text-align: center;
  }
  .comp-card .big {
    font-family: var(--mono);
    font-size: 36px;
    font-weight: 500;
    display: block;
    line-height: 1;
    margin-bottom: 4px;
  }
  .comp-card .lbl { font-size: 11px; color: var(--muted); letter-spacing: .06em; }

  .trigger-box {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.25rem;
    margin-bottom: 1rem;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.7;
  }
  .trigger-box strong { color: var(--text); font-weight: 500; }
  .trigger-box.critical { border-color: var(--red);   }
  .trigger-box.elevated { border-color: var(--amber); }

  /* ── Footer ── */
  footer {
    border-top: 1px solid var(--border);
    padding: 1.5rem 2rem;
    font-size: 11px;
    font-family: var(--mono);
    color: var(--dim);
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: .5rem;
    margin-top: 3rem;
  }
  footer a { color: var(--blue); text-decoration: none; }

  /* ── Loading / error states ── */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 200px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    gap: 12px;
  }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--dim);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin .6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-msg {
    background: var(--red-bg);
    border: 1px solid var(--red);
    border-radius: 6px;
    padding: 1rem;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--red);
  }
  @media (max-width: 600px) {
    main { padding: 1rem; }
    .risk-desc { display: none; }
    .composite-grid { grid-template-columns: 1fr 1fr; }
    .ind-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">AGL <span>//</span> FUEL RATIONING EARLY WARNING</div>
  <div class="header-right">
    <span id="fetch-time">loading…</span>
    <span><span class="pulse"></span> LIVE</span>
  </div>
</header>

<main>
  <div id="app">
    <div class="loading"><div class="spinner"></div> Loading indicators…</div>
  </div>
</main>

<footer>
  <span>Sources: EIA · RBA · ACCC · DISR · Stooq · DISR MSO reporting</span>
  <span>Auto-refreshes daily 07:00 AEST via GitHub Actions · <a href="data/indicators.json" target="_blank">raw JSON</a></span>
</footer>

<script>
const TABS = [
  { id: "overview",  label: "OVERVIEW" },
  { id: "macro",     label: "MACRO SUPPLY" },
  { id: "price",     label: "PRICE SIGNALS" },
  { id: "domestic",  label: "DOMESTIC STOCKS" },
  { id: "gaps",      label: "DATA GAPS" },
];

const INDICATOR_TABS = {
  macro:    ["brent_crude", "gasoil_crack_spread", "tanker_freight_index", "hormuz_transits"],
  price:    ["brent_crude", "audusd", "accc_fuel_price", "gasoil_crack_spread"],
  domestic: ["diesel_mso_days", "petrol_mso_days", "accc_fuel_price"],
};

const BAR_CONFIG = {
  brent_crude:          { min: 60,   max: 160,  greenEnd: 90,  amberEnd: 120, invert: true  },
  audusd:               { min: 0.50, max: 0.80, greenEnd: 0.66, amberEnd: 0.60, invert: false },
  accc_fuel_price:      { min: 120,  max: 260,  greenEnd: 180, amberEnd: 220, invert: true  },
  diesel_mso_days:      { min: 0,    max: 60,   greenEnd: 40,  amberEnd: 32,  invert: false },
  petrol_mso_days:      { min: 0,    max: 60,   greenEnd: 35,  amberEnd: 27,  invert: false },
  gasoil_crack_spread:  { min: 0,    max: 60,   greenEnd: 25,  amberEnd: 35,  invert: true  },
  tanker_freight_index: { min: 0,    max: 300,  greenEnd: 100, amberEnd: 200, invert: true  },
  hormuz_transits:      { min: 0,    max: 30,   greenEnd: 20,  amberEnd: 10,  invert: false },
};

const STATUS_COLORS = { green: "#3ecf8e", amber: "#f5a623", red: "#ff5c5c", unknown: "#454860" };

let DATA = null;
let activeTab = "overview";

async function loadData() {
  const res = await fetch(`data/indicators.json?t=${Date.now()}`);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

function fmtValue(key, val) {
  if (val === null || val === undefined) return "—";
  if (key === "audusd") return val.toFixed(4);
  if (key === "brent_crude" || key === "gasoil_crack_spread") return "$" + val.toFixed(2);
  if (key === "accc_fuel_price") return val.toFixed(1);
  return val.toLocaleString();
}

function barHTML(key, val, status) {
  const cfg = BAR_CONFIG[key];
  if (!cfg || val === null || val === undefined) return "";
  const pct = Math.max(0, Math.min(100, ((val - cfg.min) / (cfg.max - cfg.min)) * 100));
  const fillColor = STATUS_COLORS[status] || STATUS_COLORS.unknown;
  return `
    <div class="bar-wrap">
      <div class="bar-track">
        <div class="bar-fill" style="width:${pct}%;background:${fillColor}"></div>
        <div class="bar-pointer" style="left:calc(${pct}% - 1px)"></div>
      </div>
      <div class="bar-labels"><span>${cfg.min}</span><span>${cfg.max}</span></div>
    </div>`;
}

function indCardHTML(key, ind) {
  const st = ind.status || "unknown";
  const note = ind.note ? `<div class="card-note">${ind.note}</div>` : "";
  return `
    <div class="ind-card status-${st}">
      <div class="card-top">
        <div class="card-label">${ind.label || key}</div>
        <span class="status-badge ${st}">${st.toUpperCase()}</span>
      </div>
      <div class="card-value ${st}">${fmtValue(key, ind.value)}</div>
      <div class="card-unit">${ind.unit || ""}</div>
      ${barHTML(key, ind.value, st)}
      <div class="card-desc">${ind.description || ""}</div>
      <div class="card-source">src: ${ind.source || "unknown"} · ${ind.date || ""}</div>
      ${note}
    </div>`;
}

function renderOverview(d) {
  const c = d.composite;
  const risk = c.risk_level || "unknown";
  const descMap = {
    CRITICAL: "≥3 red indicators firing simultaneously. Formal rationing is a near-term certainty. Escalate immediately.",
    HIGH:     "≥2 red indicators firing. Supply conditions are severely disrupted. Internal contingency plans should activate.",
    ELEVATED: "1–2 red or multiple amber indicators. Conditions are deteriorating. Increase monitoring cadence.",
    NORMAL:   "No critical thresholds breached. Continue standard weekly monitoring.",
    unknown:  "Data fetch incomplete. Verify data sources and re-run."
  };
  const allKeys = Object.keys(d.indicators);
  return `
    <div class="risk-banner ${risk}">
      <div>
        <div class="risk-label">COMPOSITE RISK LEVEL</div>
        <div class="risk-level">${risk}</div>
      </div>
      <div class="risk-desc">${descMap[risk] || ""}</div>
      <div class="risk-counts">
        <div class="count-chip red"><span class="n">${c.red_count ?? 0}</span><span class="lbl">RED</span></div>
        <div class="count-chip amber"><span class="n">${c.amber_count ?? 0}</span><span class="lbl">AMBER</span></div>
      </div>
    </div>
    <div class="ind-grid">
      ${allKeys.map(k => indCardHTML(k, d.indicators[k])).join("")}
    </div>
    <div style="margin-top:1.5rem">
      <div class="trigger-box critical">
        <strong>Rationing imminent trigger</strong> (2+ simultaneously):<br>
        Diesel MSO &lt;32 days · Hormuz transits &lt;10/day · Independent retailer fill rate &lt;70% · 21-day pipeline &lt;2,000 ML
      </div>
      <div class="trigger-box elevated">
        <strong>Rationing risk elevated trigger</strong> (2+ simultaneously):<br>
        Diesel MSO 32–38 days · Singapore run rates 70–84% · MR freight &gt;$80/MT · Brent &gt;$110/bbl · AUD &lt;0.63
      </div>
    </div>`;
}

function renderTab(d, tabId) {
  if (tabId === "overview") return renderOverview(d);
  if (tabId === "gaps") {
    return `
      <h3 style="font-family:var(--mono);font-size:13px;color:var(--muted);margin-bottom:1rem;letter-spacing:.08em">
        DATA GAPS — indicators requiring paid subscriptions
      </h3>
      <ul class="gaps-list">
        ${(d.data_gaps || []).map(g => `<li>${g}</li>`).join("")}
      </ul>
      <div style="margin-top:1.5rem;font-size:12px;color:var(--muted);line-height:1.7">
        To fill these gaps, AGL should consider subscribing to:<br>
        <strong style="color:var(--text)">MarineTraffic Professional</strong> (~USD 1,500/yr) for AIS vessel tracking · 
        <strong style="color:var(--text)">Kpler</strong> for cargo tracking and refinery run rates · 
        <strong style="color:var(--text)">Argus</strong> or <strong style="color:var(--text)">S&amp;P Global Platts</strong> for Singapore crack spreads and MR freight.
        Even a single Argus Energy subscription would cover most price/freight gaps.
      </div>`;
  }
  const keys = INDICATOR_TABS[tabId] || [];
  return `<div class="ind-grid">${keys.map(k => {
    const ind = d.indicators[k];
    return ind ? indCardHTML(k, ind) : "";
  }).join("")}</div>`;
}

function renderApp(d) {
  const fetchedAt = d.fetched_at ? new Date(d.fetched_at).toLocaleString("en-AU", {
    timeZone: "Australia/Melbourne", dateStyle: "medium", timeStyle: "short"
  }) : "unknown";
  document.getElementById("fetch-time").textContent = "updated " + fetchedAt;

  const tabsHTML = TABS.map(t => `
    <button class="tab ${t.id === activeTab ? "active" : ""}" onclick="switchTab('${t.id}')">${t.label}</button>
  `).join("");

  document.getElementById("app").innerHTML = `
    <div class="tabs">${tabsHTML}</div>
    <div id="panel-content">${renderTab(d, activeTab)}</div>`;
}

function switchTab(id) {
  activeTab = id;
  if (!DATA) return;
  document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t.textContent.trim() === TABS.find(x=>x.id===id)?.label));
  document.getElementById("panel-content").innerHTML = renderTab(DATA, id);
}

window.switchTab = switchTab;

(async () => {
  try {
    DATA = await loadData();
    renderApp(DATA);
  } catch (err) {
    document.getElementById("app").innerHTML = `
      <div class="error-msg">
        Failed to load data/indicators.json: ${err.message}<br><br>
        Run <code>python fetch_data.py</code> locally first, then check the file exists.
      </div>`;
    document.getElementById("fetch-time").textContent = "fetch error";
  }
})();
</script>
</body>
</html>
